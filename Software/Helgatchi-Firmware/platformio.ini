; PlatformIO Project Configuration File
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

; Custom partition table — 5 MB app + ~3 MB LittleFS. The LittleFS
; partition holds /rules/factory/*.json (read-only seeds shipped with the
; build) and /rules/user/*.json (writable, persisted via RulesService).
;
; First flash with this layout WIPES NVS once; subsequent boots are stable.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; LovyanGFX ships an example lv_conf.h at:
    ;   .pio/libdeps/.../LovyanGFX/examples/Advanced/LVGL_PlatformIO/src/lv_conf.h
    ; PlatformIO's recursive scanning would find that one before ours when LVGL's
    ; library files do `#include "lv_conf.h"`. Using LV_CONF_PATH with an absolute
    ; path bypasses include-path search entirely.
    -DLV_CONF_PATH=\"$PROJECT_DIR/include/lv_conf.h\"
    ; Sysmon flags also passed as -D so the LVGL .a actually compiles
    ; lv_sysmon.c (otherwise lv_sysmon_show/hide_performance are missing).
    -DLV_USE_SYSMON=1
    -DLV_USE_PERF_MONITOR=1
    ; QR code widget used by the Tutorial screen (EEZ-generated).
    ; Both the lv_conf.h flag and this -D are required — see ARCHITECTURE.md
    ; LVGL caching footgun: header change alone may not rebuild the .a.
    -DLV_USE_QRCODE=1

extra_scripts =
    ; Scans src/ and include/ for `lv_font_montserrat_NN` references and
    ; appends `-DLV_FONT_MONTSERRAT_NN=1` for each. Combined with thereboot to restore
    ; #ifndef guards in lv_conf.h, this auto-enables any font size used
    ; by SLS-exported code without manual config edits.
    pre:scripts/auto_montserrat.py
    ; Writes include/build_info.h with today's build date and the EEZ
    ; project file's last-modified date (as the UI version).
    pre:scripts/build_info.py
    ; Reads scripts/vendors.py and emits include/vendor_tables_data.h —
    ; sorted lookup tables that RulesService uses to resolve `oui=axon`
    ; / `mfg=apple` style match clauses against scan results.
    pre:scripts/build_vendor_tables.py
    ; Bakes include/admin_secret.h (the admin-mode HMAC key + PBKDF2 password
    ; digest) from HELGATCHI_HMAC_SECRET / HELGATCHI_ADMIN_PASSWORD env vars.
    ; Hard-fails if unset unless ALLOW_DEV_ADMIN_SECRET=1. Output gitignored.
    pre:scripts/build_admin_secret.py

lib_deps =
    lovyan03/LovyanGFX
    fastled/FastLED
    lvgl/lvgl@^9.5
    bblanchon/ArduinoJson@^7.0
    h2zero/NimBLE-Arduino
