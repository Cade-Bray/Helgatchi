; PlatformIO Project Configuration File
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; LovyanGFX ships an example lv_conf.h at:
    ;   .pio/libdeps/.../LovyanGFX/examples/Advanced/LVGL_PlatformIO/src/lv_conf.h
    ; PlatformIO's recursive scanning would find that one before ours when LVGL's
    ; library files do `#include "lv_conf.h"`. Using LV_CONF_PATH with an absolute
    ; path bypasses include-path search entirely.
    -DLV_CONF_PATH=\"$PROJECT_DIR/include/lv_conf.h\"
    ; Sysmon flags also passed as -D so the LVGL .a actually compiles
    ; lv_sysmon.c (otherwise lv_sysmon_show/hide_performance are missing).
    -DLV_USE_SYSMON=1
    -DLV_USE_PERF_MONITOR=1

extra_scripts =
    ; Scans src/ and include/ for `lv_font_montserrat_NN` references and
    ; appends `-DLV_FONT_MONTSERRAT_NN=1` for each. Combined with thereboot to restore
    ; #ifndef guards in lv_conf.h, this auto-enables any font size used
    ; by SLS-exported code without manual config edits.
    pre:scripts/auto_montserrat.py

lib_deps =
    lovyan03/LovyanGFX
    fastled/FastLED
    lvgl/lvgl@^9.3
