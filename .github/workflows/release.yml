name: Firmware Release

# Builds firmware on a v* tag, merges a single flashable image, generates an
# esp-web-tools manifest, and publishes them all as GitHub Release assets.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)build a release for"
        required: true

permissions:
  contents: write
  actions: write   # to dispatch the Pages workflow after publishing

env:
  # PlatformIO env name from platformio.ini ([env:seeed_xiao_esp32s3]).
  PIO_ENV: seeed_xiao_esp32s3
  FW_DIR: Software/Helgatchi-Firmware

jobs:
  release:
    runs-on: ubuntu-latest
    # Admin-mode secrets baked at build time by scripts/build_admin_secret.py.
    # Set these as repository secrets (Settings → Secrets and variables → Actions).
    # HELGATCHI_HMAC_SECRET must be >= 32 bytes and stable across releases, or
    # devices from different builds can't validate each other's commands. Without
    # them the build hard-fails (by design — no accidental dev-default release).
    env:
      HELGATCHI_HMAC_SECRET: ${{ secrets.HELGATCHI_HMAC_SECRET }}
      HELGATCHI_ADMIN_PASSWORD: ${{ secrets.HELGATCHI_ADMIN_PASSWORD }}
    defaults:
      run:
        working-directory: ${{ env.FW_DIR }}
    steps:
      - name: Checkout (full history for git describe)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"   >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache ONLY the downloaded platform, toolchains and library sources — the
      # multi-minute download. Keyed on platformio.ini so it re-downloads when
      # versions there change. We deliberately do NOT cache compiled objects
      # (.pio/build or a content-addressed build cache): a fresh checkout always
      # compiles from clean sources, so a build-flag change can't link app code
      # against a stale library archive built with the old flags.
      - name: Cache PlatformIO home (toolchains + libs)
        uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-home-${{ runner.os }}-${{ hashFiles('Software/Helgatchi-Firmware/platformio.ini') }}
          restore-keys: |
            pio-home-${{ runner.os }}-

      - name: Install PlatformIO + esptool
        run: pip install --upgrade platformio "esptool>=5.3,<6"

      - name: Build firmware
        run: |
          pio run -e "$PIO_ENV"
          echo "== after firmware build =="; ls -la ".pio/build/$PIO_ENV"
          # `pio run -t buildfs` (next step) rebuilds .pio/build with a clean
          # SCons state and clobbers the app images, so stash them off to the
          # side now while they exist.
          mkdir -p artifacts
          cp ".pio/build/$PIO_ENV"/{bootloader,partitions,firmware}.bin artifacts/

      - name: Build LittleFS image
        run: |
          pio run -e "$PIO_ENV" -t buildfs
          echo "== after buildfs =="; ls -la ".pio/build/$PIO_ENV"
          cp ".pio/build/$PIO_ENV/littlefs.bin" artifacts/

      # No merged blob and no manifest here anymore. The web flasher writes
      # parts at their offsets (so it can skip NVS and preserve settings), and
      # the manifests are generated per-selection by the Pages workflow. We just
      # ship the four raw images; the Pages build assembles them.
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Helgatchi ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.FW_DIR }}/artifacts/bootloader.bin
            ${{ env.FW_DIR }}/artifacts/partitions.bin
            ${{ env.FW_DIR }}/artifacts/firmware.bin
            ${{ env.FW_DIR }}/artifacts/littlefs.bin

      # Rebuild the Pages flasher so it mirrors this new release same-origin.
      # A `release: published` trigger won't fire for a release made by the
      # Actions token; workflow_dispatch is exempt from that recursion guard.
      - name: Refresh Web Flasher
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --repo "$GITHUB_REPOSITORY" --ref main -f tag="${{ steps.ver.outputs.tag }}"
