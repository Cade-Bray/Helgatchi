name: Deploy Web Flasher

# Publishes WebFlasher/ to GitHub Pages. The site pulls the release list (and
# each release's manifest) from the GitHub API at runtime, so it does NOT need
# to be redeployed when a new firmware version is released — only when the site
# itself changes.
on:
  push:
    branches: [main]
    paths:
      - "WebFlasher/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Grants the deploy job an OIDC token + Pages write, per GitHub Pages docs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      # Mirror release assets into the site so the flasher serves them
      # same-origin (GitHub's release-asset host blocks cross-origin fetches).
      # Runs server-side on the runner, so there's no CORS wall here. Binaries
      # are pulled fresh each deploy and never committed to the repo.
      - name: Bundle firmware from releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd WebFlasher
          mkdir -p firmware
          # Keep only releases that actually carry a manifest.json asset, newest
          # first, shaped for the flasher. Paths are relative + same-origin.
          # `--paginate` emits one array per page; `-s add` merges them into one.
          gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            | jq -s 'add
                     | map(select(.draft | not)
                           | select(any(.assets[]; .name == "manifest.json"))
                           | { tag: .tag_name,
                               prerelease: .prerelease,
                               date: .published_at,
                               manifest: ("firmware/" + .tag_name + "/manifest.json") })' \
            > versions.json
          # Download each kept release's manifest + merged image into its dir.
          for tag in $(jq -r '.[].tag' versions.json); do
            mkdir -p "firmware/$tag"
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
              --pattern 'manifest.json' --pattern '*-merged.bin' \
              --dir "firmware/$tag" --clobber
          done
          echo "== bundled versions =="; cat versions.json
          echo "== firmware tree =="; find firmware -type f

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: WebFlasher

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
